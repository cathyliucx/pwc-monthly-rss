name: Update monthly Papers with Code feed

on:
  workflow_dispatch:

  push:
    branches:
      - main

  schedule:
    # UTC 00:00 和 12:00
    # 日本时间 09:00 和 21:00
    - cron: "0 0,12 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.23"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        run: uv python install

      - name: Verify lock file
        run: uv lock --check

      - name: Sync environment
        run: uv sync --locked

      - name: Install Playwright Chromium
        run: uv run --locked playwright install --with-deps chromium

      - name: Generate feed
        env:
          TZ: Asia/Tokyo
        run: uv run --locked python generate_feed.py

      - name: Verify feed
        run: |
          test -f docs/feed.xml
          head -20 docs/feed.xml

      - name: Disable Jekyll
        run: touch docs/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
